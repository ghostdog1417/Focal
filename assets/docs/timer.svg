<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#f8f9fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8def"/>
      <stop offset="100%" stop-color="#7ba1f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bg)"/>

  <rect x="360" y="36" width="680" height="828" rx="30" fill="#ffffff" stroke="#dce5f6" filter="url(#shadow)"/>

  <text x="430" y="110" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1c1c1e">Study Timer</text>
  <text x="430" y="150" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">Pomodoro: 25 min focus • 5 min break</text>

  <rect x="430" y="186" width="540" height="64" rx="18" fill="#f3f7ff"/>
  <text x="500" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#1c1c1e">Focus Mode</text>
  <text x="840" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" fill="#6b7280">Break Mode</text>
  <rect x="430" y="186" width="270" height="64" rx="18" fill="#e3ecff"/>

  <rect x="430" y="272" width="540" height="408" rx="24" fill="#ffffff" stroke="#e6ebf2"/>
  <circle cx="700" cy="472" r="138" fill="#edf3ff"/>
  <circle cx="700" cy="472" r="166" fill="none" stroke="#e7ebf3" stroke-width="18"/>
  <circle
    cx="700"
    cy="472"
    r="166"
    fill="none"
    stroke="url(#accent)"
    stroke-width="18"
    stroke-linecap="round"
    stroke-dasharray="785 1043"
    stroke-dashoffset="72"
    transform="rotate(-90 700 472)"
  />
  <circle cx="700" cy="472" r="18" fill="#5b8def" opacity="0.18"/>

  <text x="700" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="#1c1c1e">18:42</text>
  <text x="700" y="498" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6b7280">Focus Session</text>
  <rect x="630" y="528" width="140" height="34" rx="17" fill="#eef4ff"/>
  <text x="700" y="551" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#5b8def">Session 1 of 4</text>

  <text x="700" y="628" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#6b7280">Deep work session in progress</text>

  <rect x="430" y="704" width="158" height="60" rx="14" fill="#5b8def"/>
  <text x="509" y="742" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Start</text>

  <rect x="621" y="704" width="158" height="60" rx="14" fill="#2c3652"/>
  <text x="700" y="742" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Pause</text>

  <rect x="812" y="704" width="158" height="60" rx="14" fill="#ffffff" stroke="#d7dbe6" stroke-width="2"/>
  <text x="891" y="742" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1c1c1e">Reset</text>
</svg>
